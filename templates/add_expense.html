{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/add_expense.css') }}">
{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-container">
    <div class="auth-header">
      <h1 class="auth-title">Add Expense</h1>
      <p class="auth-subtitle">Record a new expense to your account</p>
    </div>

    <div class="auth-card">
      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('add_expense') }}">

        <div class="form-group">
          <label for="amount">Amount (₹)</label>
          <input type="number" id="amount" name="amount" class="form-input"
                 step="0.01" min="0.01" placeholder="0.00"
                 value="{{ form.get('amount', '') }}" required>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category" class="form-input form-select" required>
            <option value="" disabled {% if not form.get('category') %}selected{% endif %}>Select a category</option>
            {% for cat in categories %}
            <option value="{{ cat }}" {% if form.get('category') == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" name="date" class="form-input"
                 value="{{ form.get('date', today) }}" required>
        </div>

        <div class="form-group">
          <label for="description">Description <span class="label-optional">(optional)</span></label>
          <input type="text" id="description" name="description" class="form-input"
                 placeholder="e.g. Grocery run"
                 value="{{ form.get('description', '') }}">
        </div>

        <button type="submit" class="btn-submit">Save Expense</button>
      </form>
    </div>

    <p class="auth-switch">
      Changed your mind? <a href="{{ url_for('profile') }}">Back to profile</a>
    </p>
  </div>
</section>
{% endblock %}
